# ─── 1. TRUSTED PROXY ───────────────────────────────────────────────────────
# Hanya terima koneksi dari Nginx reverse proxy di 192.10.10.15.
# Modul ngx_http_realip_module akan mengganti $remote_addr dengan nilai dari
# header X-Real-IP sehingga aplikasi (dan log) mendapatkan IP asli Android.
# ─────────────────────────────────────────────────────────────────────────────

# log_format harus di http context (di luar server block)
# File ini di-include di dalam http{} oleh nginx.conf, jadi aman.
log_format main_real '$remote_addr [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" real_ip=$http_x_real_ip';

geo $trusted_proxy {
    default          0;
    192.10.10.15     1;   # Nginx reverse proxy
}

server {
    listen 80;
    server_name absen.sulfat.site;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Trusted Proxy: baca IP asli klien dari header X-Real-IP ──────────────
    set_real_ip_from  192.10.10.15;
    real_ip_header    X-Real-IP;
    real_ip_recursive on;

    # ── Logging (tampilkan IP asli, bukan IP proxy) ──────────────────────────
    access_log /var/log/nginx/access.log main_real;
    error_log  /var/log/nginx/error.log  warn;

    # ── Security headers (non-CORS) ──────────────────────────────────────────
    # CORS TIDAK diset di sini — ditangani di aplikasi backend agar tidak
    # terjadi double-header yang menyebabkan error di Android.
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # ── Koneksi dari selain proxy yang dipercaya → blok ──────────────────────
    # Hapus/komentari blok ini jika server hanya bisa diakses lewat LAN.
    # Aktifkan jika port 8080 terbuka ke publik.
    # if ($trusted_proxy = 0) {
    #     return 403;
    # }

    location / {
        try_files $uri $uri/ =404;
    }

    # ── Cache static assets ──────────────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ── 3. NO SSL di backend ─────────────────────────────────────────────────
    # SSL sudah terminate di Nginx 192.10.10.15.
    # Traffic Nginx → container ini berjalan HTTP di LAN internal saja.
    # ─────────────────────────────────────────────────────────────────────────
}

services:
  absen-web:
    image: nginx:alpine
    container_name: absen_sulfat
    restart: unless-stopped
    ports:
      - "8080:80"         # reverse proxy 192.10.10.15 → host:8080 → container:80
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs:/var/log/nginx
    environment:
      - TZ=Asia/Jakarta
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  default:
    name: absen_network
